# ─────────────────────────────────────────────────────────────────────────────
# eval-py/deployment.yaml — FastAPI evaluation service
#
# Image: llmqa/eval-py:latest (built from packages/eval-py/Dockerfile)
# Build:  docker build -t llmqa/eval-py:latest packages/eval-py/
# Or via compose: docker compose build eval-py
#
# Env variables are injected from ConfigMap + Secret.
# Depends on postgres + redis being Ready (handled via initContainers).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eval-py
  namespace: llmqa
  labels:
    app: eval-py
    version: "0.9.0"
    app.kubernetes.io/part-of: llm-qa-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eval-py
  template:
    metadata:
      labels:
        app: eval-py
        version: "0.9.0"
    spec:

      # ── Wait for postgres + redis before starting uvicorn ──────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-svc 5432; do
                sleep 2
              done
              echo "PostgreSQL is up."

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until nc -z redis-svc 6379; do
                sleep 2
              done
              echo "Redis is up."

      containers:
        - name: eval-py
          image: llmqa/eval-py:latest
          imagePullPolicy: IfNotPresent   # use local image in dev; change to Always in CI/CD
          ports:
            - containerPort: 8010
              name: http

          env:
            # ── DB (URL assembled from secret) ───────────────────────────────
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: llmqa-secret
                  key: DB_URL

            # ── Redis ────────────────────────────────────────────────────────
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: llmqa-config
                  key: REDIS_URL

            # ── OpenAI (tool calling, Step 9) ────────────────────────────────
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llmqa-secret
                  key: OPENAI_API_KEY

            # ── Uvicorn log level ────────────────────────────────────────────
            - name: APP_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: llmqa-config
                  key: APP_LOG_LEVEL

          # ── Health checks ────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          # ── Resource limits ──────────────────────────────────────────────
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
