# ─────────────────────────────────────────────────────────────────────────────
# prometheus.yml — Step 13: Prometheus scraping configuration
#
# Scrapes:
#   - eval-py FastAPI service (custom metrics + auto-instrumented HTTP metrics)
#   - postgres exporter (when available)
#   - redis exporter (when available)
#
# Run with: docker compose up prometheus grafana
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s          # how often to scrape each target
  evaluation_interval: 15s      # how often to evaluate alerting rules
  scrape_timeout: 10s

  external_labels:
    environment: "local-dev"
    project: "llm-qa-ops-lab"

# ── Alerting rules ─────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/alerts/*.yml"

# ── Alertmanager (optional — configure in docker-compose to enable) ────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ── Scrape targets ─────────────────────────────────────────────────────────
scrape_configs:

  # eval-py FastAPI service (Docker)
  # Exposes: HTTP request metrics (auto) + custom llmqa_* metrics
  - job_name: "eval-py"
    static_configs:
      - targets: ["eval-py:8010"]
    metrics_path: "/prometheus-metrics"
    scrape_interval: 15s

  # eval-py running locally on host (workaround for stuck Docker container)
  - job_name: "eval-py-local"
    static_configs:
      - targets: ["172.22.0.1:8011"]
    metrics_path: "/prometheus-metrics"
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
