name: CI — LLM-QA-OPS-LAB

# ─────────────────────────────────────────────────────────────────────────────
# Step 13: CI/CD Pipeline
#
# Triggers:
#   - Push to main or any feature/* branch
#   - Pull requests targeting main
#
# Jobs:
#   1. lint-py      — ruff on eval-py + dash-app Python code
#   2. test-py      — pytest on eval-py (unit tests, no external services)
#   3. lint-ts      — ESLint on TypeScript packages
#   4. test-ts      — vitest on TypeScript packages
#   5. docker-build — build eval-py + dash-app Docker images (validate only on PR,
#                     push to GHCR on merge to main)
#
# SLO validation embedded in CI:
#   - Tests must pass with 0 failures (100% green = deployment gate)
#   - Docker build must succeed (image integrity check)
#   - Linting enforces code quality SLO
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_EVAL_PY: ghcr.io/${{ github.repository_owner }}/llmqa-eval-py
  IMAGE_DASH_APP: ghcr.io/${{ github.repository_owner }}/llmqa-dash-app
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:

  # ── 1. Python Lint ──────────────────────────────────────────────────────────
  lint-py:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Lint eval-py
        run: ruff check packages/eval-py/src --output-format=github

      - name: Lint dash-app
        run: ruff check packages/dash-app/src --output-format=github

  # ── 2. Python Tests ─────────────────────────────────────────────────────────
  test-py:
    name: Test Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install eval-py with test dependencies
        working-directory: packages/eval-py
        run: |
          pip install -e ".[dev]"
          pip install pgvector prometheus-client "prometheus-fastapi-instrumentator>=7.0"

      - name: Run pytest
        working-directory: packages/eval-py
        env:
          # No OPENAI_API_KEY — tests run in offline mode via conftest.py fixture
          DB_URL: ""
          REDIS_URL: ""
        run: pytest tests/ -v --tb=short

  # ── 3. TypeScript Lint ──────────────────────────────────────────────────────
  lint-ts:
    name: Lint TypeScript (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript
        run: pnpm lint || true   # non-blocking until lint is fully configured

  # ── 4. TypeScript Tests ─────────────────────────────────────────────────────
  test-ts:
    name: Test TypeScript (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        run: pnpm test --run

  # ── 5. Docker Build & Push ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint-py, test-py]  # only build if lint + tests pass
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build eval-py image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/eval-py
          dockerfile: ./packages/eval-py/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_EVAL_PY }}:latest
            ${{ env.IMAGE_EVAL_PY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dash-app image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/dash-app
          dockerfile: ./packages/dash-app/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_DASH_APP }}:latest
            ${{ env.IMAGE_DASH_APP }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. Security Scan (Trivy) ────────────────────────────────────────────────
  # Scansiona il filesystem di eval-py (pyproject.toml + Dockerfile) alla ricerca
  # di CVE CRITICAL/HIGH nelle dipendenze Python.
  #
  # Perché filesystem scan invece di image scan:
  #   L'image scan richiederebbe di ri-autenticarsi con GHCR in questo job
  #   separato (il login di docker-build non sopravvive tra i job).
  #   Il filesystem scan trova gli stessi CVE Python leggendo pyproject.toml
  #   direttamente dal checkout — nessuna dipendenza dal registry, nessun
  #   token aggiuntivo, stessa utilità pratica per un portfolio project.
  security-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on eval-py source
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: "fs"
          scan-ref: "./packages/eval-py"
          format: "sarif"
          output: "trivy-eval-py.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # report but don't fail CI (set to 1 for hard security gate)

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true   # requires GHAS (not available on public free repos)
        with:
          sarif_file: "trivy-eval-py.sarif"
          category: "trivy-eval-py"
