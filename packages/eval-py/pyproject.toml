[project]
name = "eval-py"
version = "0.1.0"
description = "LLM-QA-OPS evaluation service (FastAPI + Pydantic + pytest)"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.27",
  "pydantic>=2.6",
  "sqlalchemy>=2.0",
  "psycopg2-binary>=2.9",
  "pandas>=2.0",
  "polars>=0.20",
  "redis>=5.0",
  "openai>=1.0",
  "python-dotenv>=1.0",
  # Step 12 — RAG + pgvector
  "pgvector>=0.3",
  # Step 12 — Prometheus observability
  "prometheus-client>=0.20",
  "prometheus-fastapi-instrumentator>=7.0",
  # Step 14 — LangGraph agentic pipeline
  "langgraph>=0.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "httpx>=0.27",
  "ruff>=0.4",
]
# Step 13 — LlamaIndex RAG pipeline (optional, install separately)
# pip install eval-py[llamaindex]
llamaindex = [
  "llama-index-core>=0.10",
  "llama-index-embeddings-openai>=0.1",
  "llama-index-vector-stores-postgres>=0.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
