[project]
name = "dash-app"
version = "0.1.0"
description = "Interactive dashboard for LLM-QA-OPS evaluation system"
requires-python = ">=3.11"
dependencies = [
  "dash>=2.16",
  "plotly>=5.17",
  "dash-bootstrap-components>=1.5",
  "requests>=2.31",
  "pandas>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.4",
]

[tool.ruff]
line-length = 100